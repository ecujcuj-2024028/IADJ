version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: youtube-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=youtube_music_dj
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  python-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.python
    container_name: youtube-python-service
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=youtube_music_dj
      - DB_USER=postgres
      - DB_PASS=admin
    depends_on:
      - db
    restart: always

  node-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.node
    container_name: youtube-node-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - PYTHON_SERVICE_URL=http://python-service:8000
      - DB_HOST=db
      - PORT=3001
    depends_on:
      - python-service
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: youtube-frontend
    ports:
      - "5173:5173"
    depends_on:
      - node-backend
    restart: always

volumes:
  postgres_data:
